<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Preview Card Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <div class="icerik">
            <div class="urun-resmi">
                <picture>
                    <source media="(max-width:375px)" srcset="img/image-product-mobile.jpg">
                    <img src="img/image-product-desktop.jpg" alt="">
                </picture>
            </div>
            
            <div class="urun-bilgi">
                <div class="baslik-1">P E R F U M E</div>
                <div class="baslik-2"><h1>Gabrielle Essence Eau De Parfum</h1></div>
                <div class="urun-yazi"><p>A floral, solar and voluptuous interpretation composed by Olivier Polge,
                    Perfumer-Creator for the House of CHANEL.
                </p></div>
                <div class="fiyatlar">
                    <div class="yeni-fiyat"><h1>$149.99</h1></div>
                    <div class="eski-fiyat">$169.99</div>
                </div>
                <button class="btn">
                    <h1><img src="img/icon-cart.svg" alt="">Add to Cart</h1>
                </button>
            </div>
        </div>
    </div>

</body>
</html>
